name: Update language stats

on:
  schedule:
    - cron: '0 3 * * 0'  # cada domingo a las 3am UTC
  workflow_dispatch:       # también se puede correr manualmente desde Actions

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run language update script
        env:
          GH_TOKEN: ${{ secrets.LANG_STATS_TOKEN }}
          GH_USER: MatiasEzequielVazquez
        run: python scripts/update_langs.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update language stats [skip ci]"
          git push
